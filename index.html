<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prefect course — lessons</title>
    <!-- Reuse the lessons' theme variables + typography; layout is overridden below. -->
    <link rel="stylesheet" href="assets/lesson.css" />
    <style>
      /* ---- shell layout (overrides lesson.css's centered single-column body) ---- */
      body {
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      a { color: inherit; }

      /* ---- sidebar ---- */
      .sidebar {
        flex: 0 0 18rem;
        height: 100vh;
        overflow-y: auto;
        background: #fbfaf6;
        border-right: 1px solid var(--rule);
        padding: 1.4rem 0 3rem;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      .sidebar .brand {
        display: block;
        padding: 0 1.4rem 1rem;
        margin-bottom: 0.4rem;
        border-bottom: 1px solid var(--rule);
        text-decoration: none;
        cursor: pointer;
      }
      .sidebar .brand b {
        display: block;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--ink);
      }
      .sidebar .brand span {
        font-size: 0.72rem;
        color: var(--ink-faint);
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }
      .sec {
        margin: 1.3rem 0 0.3rem;
        padding: 0 1.4rem;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--accent);
      }
      .navlink {
        display: flex;
        gap: 0.6rem;
        align-items: baseline;
        padding: 0.42rem 1.4rem;
        font-size: 0.92rem;
        line-height: 1.3;
        color: var(--ink-soft);
        text-decoration: none;
        border-left: 3px solid transparent;
      }
      .navlink:hover { background: var(--accent-dim); color: var(--ink); }
      .navlink.active {
        background: var(--accent-dim);
        color: var(--accent);
        font-weight: 600;
        border-left-color: var(--accent);
      }
      .navlink .num {
        flex: 0 0 1.6rem;
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: var(--ink-faint);
        font-size: 0.82rem;
      }
      .navlink.active .num { color: var(--accent); }

      /* ---- main pane ---- */
      .pane { flex: 1 1 auto; position: relative; height: 100vh; overflow: hidden; }
      .frame { width: 100%; height: 100%; border: 0; display: none; background: var(--paper); }
      .frame.show { display: block; }

      .catalog {
        height: 100%;
        overflow-y: auto;
        padding: 4rem 2.5rem 6rem;
        display: none;
      }
      .catalog.show { display: block; }
      .catalog-inner { max-width: var(--maxw); margin-inline: auto; }
      .lead { font-size: 1.18rem; color: var(--ink-soft); font-style: italic; margin: 0 0 2.4rem; }

      .cat-sec { margin: 2.6rem 0 0; }
      .cat-sec > h2 {
        font-size: 1.05rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
        border-top: 1px solid var(--rule);
        padding-top: 1.2rem;
        margin: 0 0 1rem;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      .card {
        display: block;
        text-decoration: none;
        color: inherit;
        padding: 0.9rem 1.1rem;
        margin: 0 0 0.7rem;
        border: 1px solid var(--rule);
        border-radius: 8px;
        background: #fff;
        transition: border-color 0.12s, box-shadow 0.12s;
      }
      .card:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(10, 79, 160, 0.08); }
      .card .ct { display: flex; gap: 0.6rem; align-items: baseline; }
      .card .ct .num {
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.1em;
      }
      .card .ct h3 { margin: 0; font-size: 1.1rem; font-weight: 700; }
      .card p { margin: 0.35rem 0 0; font-size: 0.95rem; color: var(--ink-soft); line-height: 1.5; }

      .ref-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
      .ref-chip {
        text-decoration: none;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 0.85rem;
        color: var(--ink-soft);
        padding: 0.4rem 0.8rem;
        border: 1px solid var(--rule);
        border-radius: 999px;
        background: #fff;
      }
      .ref-chip:hover { border-color: var(--accent); color: var(--accent); }

      /* ---- mobile toggle (hidden on wide screens) ---- */
      .navtoggle {
        display: none;
        position: fixed;
        top: 0.7rem;
        left: 0.7rem;
        z-index: 20;
        font-family: ui-sans-serif, system-ui, sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        padding: 0.4rem 0.8rem;
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
      }
      .scrim { display: none; }

      @media (max-width: 820px) {
        .navtoggle { display: block; }
        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          z-index: 30;
          transform: translateX(-100%);
          transition: transform 0.2s ease;
          box-shadow: 2px 0 16px rgba(0, 0, 0, 0.12);
        }
        .sidebar.open { transform: translateX(0); }
        .scrim.show {
          display: block;
          position: fixed;
          inset: 0;
          z-index: 25;
          background: rgba(0, 0, 0, 0.3);
        }
        .catalog { padding: 4rem 1.3rem 6rem; }
      }
    </style>
  </head>
  <body>
    <button class="navtoggle" id="navtoggle" aria-label="Toggle lesson navigation">☰ Lessons</button>
    <div class="scrim" id="scrim"></div>
    <nav class="sidebar" id="sidebar" aria-label="Course navigation"></nav>
    <div class="pane">
      <div class="catalog" id="catalog"></div>
      <iframe class="frame" id="frame" title="Lesson content"></iframe>
    </div>

    <script>
      // ---- Manifest: single source of truth for the sidebar AND the catalog. ----
      // Section boundaries follow the course arc in NOTES.md. Guarded against drift
      // by tests/test_docs_integrity.py (every file: must match the lessons/ dir).
      const SECTIONS = [
        {
          title: "Foundations",
          lessons: [
            { n: 1, file: "0001-see-your-flow-run.html", title: `See your flow run`, sub: `Right now your flow runs and vanishes. The first step to a production pipeline is being able to watch it — and read what happened after it's gone.` },
            { n: 2, file: "0002-when-things-fail.html", title: `When things fail`, sub: `Networks blip. APIs return 503 for two seconds and then recover. A cron job would die and page you at 3am. A resilient flow just tries again — and you find out in the morning it healed itself.` },
            { n: 3, file: "0003-dont-redo-work.html", title: `Don't redo work`, sub: `Retries re-run work that failed. Caching does the opposite: it lets a task that already succeeded hand back its old result instantly — no slow API call, no re-download, no waiting.` },
            { n: 4, file: "0004-results-and-cos.html", title: `Cache big artifacts in COS`, sub: `An encoded mp4 is megabytes, not an integer. Put it in object storage and have Prefect remember "I already encoded this, here's where it is" — on local MinIO, then Tencent COS.` },
            { n: 5, file: "0005-on-a-schedule.html", title: `Put it on a schedule`, sub: `Stop typing python script.py. Hand the script to Prefect and have it run on its own, every night, whether or not you're watching. That's a deployment.` },
            { n: 6, file: "0006-diagnose-a-failure.html", title: `Diagnose a failed run`, sub: `A scheduled run failed at 3am while you slept. With Prefect the run is sitting in history with its state, its logs, and the exact line that blew up — waiting for you.` },
            { n: 7, file: "0007-get-alerted.html", title: `Get alerted when it breaks`, sub: `You shouldn't have to notice a failure. The last mile is Prefect reaching out the moment a run fails — so you find out from a ping, not from a confused user.` },
          ],
        },
        {
          title: "Pools & workers",
          lessons: [
            { n: 8, file: "0008-work-pools-and-workers.html", title: `Work pools & workers`, sub: `serve() was one process that did everything. The grown-up model splits it in two: deployments describe what to run, workers decide where. The door to scaling out.` },
            { n: 9, file: "0009-distribute-the-work.html", title: `Distribute the work`, sub: `The other axis: spreading the tasks inside one run so they don't crawl through one at a time. One decorator argument turns a sequence of waits into an overlap.` },
            { n: 10, file: "0010-review-and-retrieve.html", title: `Review & retrieve`, sub: `No new material — this lesson makes the last nine stick. Answer from memory before revealing. The effort of recall converts "I've seen this" into "I know this".` },
          ],
        },
        {
          title: "The fleet",
          lessons: [
            { n: 11, file: "0011-count-runs-not-cores.html", title: `Count runs, not cores`, sub: `When the work is already maximally parallel — a CPU-pinning AV1 encode in an external process — how do you stop a fleet of mismatched machines from running too much at once?` },
            { n: 12, file: "0012-fan-out-the-fleet.html", title: `Fan out across the fleet`, sub: `One unpack job spawns dozens of encodes — how do you make the whole fleet chew through them at once, without light jobs starving behind heavy ones?` },
            { n: 13, file: "0013-gather-the-fan-out.html", title: `Gather the fan-out`, sub: `L12 fired each encode off fire-and-forget and walked away. A real coordinator has to come back: did all 30 segments finish? What if 2 crashed — or the coordinator itself dies and reruns?` },
            { n: 14, file: "0014-the-async-coordinator.html", title: `The async coordinator`, sub: `wait_for_flow_run is async-only in our build, so a coordinator that gathers the documented way has to be an async def flow. Here's how to write it.` },
            { n: 15, file: "0015-run-the-fleet.html", title: `Run the fleet`, sub: `Four lessons of theory and nothing actually run. Time to stop reading and execute the whole fan-out fleet on your Docker stack.` },
            { n: 16, file: "0016-review-the-fleet.html", title: `Review the fleet`, sub: `No new material — this makes the last five lessons stick. L11–L15 built the whole fan-out fleet; the questions are shuffled across all five. Answer from memory before you reveal.` },
          ],
        },
      ];

      // Reference cheatsheets, loosely ordered to follow the lesson arc.
      const REFERENCE = [
        { file: "glossary.html", title: `Glossary` },
        { file: "resilience-cheatsheet.html", title: `Resilience knobs` },
        { file: "caching-cheatsheet.html", title: `Caching` },
        { file: "results-storage-cheatsheet.html", title: `Results & storage` },
        { file: "deployments-cheatsheet.html", title: `Deployments & schedules` },
        { file: "diagnosis-cheatsheet.html", title: `Diagnosing failed runs` },
        { file: "alerts-cheatsheet.html", title: `Alerting` },
        { file: "work-pools-cheatsheet.html", title: `Work pools & workers` },
        { file: "task-runners-cheatsheet.html", title: `Task runners` },
        { file: "concurrency-cheatsheet.html", title: `Concurrency limits` },
        { file: "topology-cheatsheet.html", title: `Fleet topology` },
      ];

      const LEAD = "Turning fragile cron + print() scripts into reliable, observable Prefect 3 pipelines — scaling toward a heterogeneous AV1-encode media fleet.";

      // ---- Build a slug → {path, file, label} lookup for routing. ----
      const sidebar = document.getElementById("sidebar");
      const catalog = document.getElementById("catalog");
      const frame = document.getElementById("frame");
      const scrim = document.getElementById("scrim");

      const BYSLUG = {};
      const slugOf = (file) => file.replace(/\.html$/, "");

      function el(tag, cls, attrs) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        if (attrs) for (const k in attrs) e.setAttribute(k, attrs[k]);
        return e;
      }

      // --- sidebar ---
      const brand = el("a", "brand", { href: "#" });
      brand.innerHTML = "<b>The Prefect Course</b><span>16 lessons · 11 references</span>";
      sidebar.appendChild(brand);

      for (const section of SECTIONS) {
        const h = el("div", "sec");
        h.textContent = section.title;
        sidebar.appendChild(h);
        for (const l of section.lessons) {
          const slug = slugOf(l.file);
          BYSLUG[slug] = { path: "lessons/" + l.file, file: l.file, label: "Lesson " + l.n };
          const a = el("a", "navlink", { href: "#" + slug, "data-slug": slug });
          const num = el("span", "num");
          num.textContent = l.n;
          const t = el("span");
          t.textContent = l.title;
          a.append(num, t);
          sidebar.appendChild(a);
        }
      }
      const refHdr = el("div", "sec");
      refHdr.textContent = "Reference";
      sidebar.appendChild(refHdr);
      for (const r of REFERENCE) {
        const slug = slugOf(r.file);
        BYSLUG[slug] = { path: "reference/" + r.file, file: r.file, label: r.title };
        const a = el("a", "navlink", { href: "#" + slug, "data-slug": slug });
        const num = el("span", "num");
        num.textContent = "§";
        const t = el("span");
        t.textContent = r.title;
        a.append(num, t);
        sidebar.appendChild(a);
      }

      // --- catalog (landing page) ---
      const inner = el("div", "catalog-inner");
      const h1 = el("h1");
      h1.textContent = "The Prefect Course";
      const lead = el("p", "lead");
      lead.textContent = LEAD;
      inner.append(h1, lead);

      for (const section of SECTIONS) {
        const sec = el("div", "cat-sec");
        const sh = el("h2");
        sh.textContent = section.title;
        sec.appendChild(sh);
        for (const l of section.lessons) {
          const slug = slugOf(l.file);
          const card = el("a", "card", { href: "#" + slug });
          const ct = el("div", "ct");
          const num = el("span", "num");
          num.textContent = "L" + l.n;
          const t = el("h3");
          t.textContent = l.title;
          ct.append(num, t);
          const p = el("p");
          p.textContent = l.sub;
          card.append(ct, p);
          sec.appendChild(card);
        }
        inner.appendChild(sec);
      }
      const refSec = el("div", "cat-sec");
      const refH = el("h2");
      refH.textContent = "Reference";
      refSec.appendChild(refH);
      const grid = el("div", "ref-grid");
      for (const r of REFERENCE) {
        const chip = el("a", "ref-chip", { href: "#" + slugOf(r.file) });
        chip.textContent = r.title;
        grid.appendChild(chip);
      }
      refSec.appendChild(grid);
      inner.appendChild(refSec);
      catalog.appendChild(inner);

      // ---- routing ----
      function currentSlug() {
        return decodeURIComponent(location.hash.replace(/^#/, ""));
      }
      function loadedFile() {
        // Basename of the doc actually showing in the iframe (handles in-lesson
        // footer nav, which changes the iframe's location without touching src).
        try {
          return frame.contentWindow.location.pathname.split("/").pop();
        } catch (e) {
          const s = frame.getAttribute("src");
          return s ? s.split("/").pop() : "";
        }
      }
      function highlight(slug) {
        sidebar.querySelectorAll(".navlink").forEach((a) => {
          a.classList.toggle("active", a.getAttribute("data-slug") === slug);
        });
      }
      function showCatalog() {
        frame.classList.remove("show");
        catalog.classList.add("show");
        highlight(null);
      }
      function showFrame() {
        catalog.classList.remove("show");
        frame.classList.add("show");
      }
      function route() {
        const slug = currentSlug();
        const item = BYSLUG[slug];
        if (!item) {
          showCatalog();
          return;
        }
        if (loadedFile() !== item.file) frame.src = item.path;
        showFrame();
        highlight(slug);
      }

      // Keep the URL + sidebar in sync when a lesson's own footer prev/next link
      // navigates the iframe internally. Update the hash (which re-runs route),
      // but route() won't reload because loadedFile() already matches.
      frame.addEventListener("load", () => {
        const slug = slugOf(loadedFile());
        if (BYSLUG[slug] && slug !== currentSlug()) location.hash = "#" + slug;
        else if (BYSLUG[slug]) highlight(slug);
        closeNav();
      });

      // ---- mobile nav toggle ----
      function openNav() {
        sidebar.classList.add("open");
        scrim.classList.add("show");
      }
      function closeNav() {
        sidebar.classList.remove("open");
        scrim.classList.remove("show");
      }
      document.getElementById("navtoggle").addEventListener("click", () => {
        sidebar.classList.contains("open") ? closeNav() : openNav();
      });
      scrim.addEventListener("click", closeNav);
      sidebar.addEventListener("click", (e) => {
        if (e.target.closest("a")) closeNav();
      });

      window.addEventListener("hashchange", route);
      route();
    </script>
  </body>
</html>
