# Local Prefect stack for the playground — everything in one place.
#
#   docker compose up -d --build   # start Postgres + Prefect server + MinIO
#   docker compose down            # stop (keeps data in volumes)
#   docker compose down -v         # stop + wipe ALL data (DB + bucket)
#
# Prefect API/UI: http://localhost:4200     (clients use http://127.0.0.1:4200/api)
# MinIO API:      http://localhost:9000     MinIO console: http://localhost:9001
#
# Run flows from the host as usual (`uv run python 01_getting_started.py`) — the
# host client talks to the Dockerized server on :4200. No more `prefect server start`.

services:
  # --- Prefect's metadata database -------------------------------------------
  postgres:
    image: postgres:16
    container_name: prefect-playground-postgres
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Prefect API + UI (server) ---------------------------------------------
  # Built from Dockerfile.server so the version matches the pinned client.
  prefect-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: prefect-playground-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_UI_API_URL: http://localhost:4200/api
      PREFECT_SERVER_ANALYTICS_ENABLED: "false"
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:4200/api/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # --- MinIO: S3-compatible object store standing in for Tencent COS ----------
  minio:
    image: minio/minio:latest
    container_name: prefect-playground-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot: wait for MinIO, then create the bucket the lessons use.
  createbucket:
    image: minio/mc:latest
    container_name: prefect-playground-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/prefect-artifacts &&
      echo 'bucket prefect-artifacts ready'
      "

volumes:
  postgres-data:
  minio-data:
